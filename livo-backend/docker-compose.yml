  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: livo-api-gateway
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      KAFKA_BROKER: kafka:29092
      GATEWAY_PORT: 4000
    env_file: .env
    networks: [livo-net]

networks:
  livo-net:
    driver: bridge
