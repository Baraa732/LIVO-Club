services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: livo-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [livo-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: livo-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks: [livo-net]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: livo-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: livo-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks: [livo-net]

  # ── Microservices ───────────────────────────────────────────────────────────
  hero-service:
    build:
      context: .
      dockerfile: apps/hero-service/Dockerfile
    container_name: livo-hero-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
    env_file: .env
    networks: [livo-net]

  about-service:
    build:
      context: .
      dockerfile: apps/about-service/Dockerfile
    container_name: livo-about-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
    env_file: .env
    networks: [livo-net]

  events-service:
    build:
      context: .
      dockerfile: apps/events-service/Dockerfile
    container_name: livo-events-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
    env_file: .env
    networks: [livo-net]

  games-service:
    build:
      context: .
      dockerfile: apps/games-service/Dockerfile
    container_name: livo-games-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
    env_file: .env
    networks: [livo-net]

  teams-service:
    build:
      context: .
      dockerfile: apps/teams-service/Dockerfile
    container_name: livo-teams-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
    env_file: .env
    networks: [livo-net]

  champions-service:
    build:
      context: .
      dockerfile: apps/champions-service/Dockerfile
    container_name: livo-champions-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
    env_file: .env
    networks: [livo-net]

  gallery-service:
    build:
      context: .
      dockerfile: apps/gallery-service/Dockerfile
    container_name: livo-gallery-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
    env_file: .env
    networks: [livo-net]

  rules-service:
    build:
      context: .
      dockerfile: apps/rules-service/Dockerfile
    container_name: livo-rules-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
    env_file: .env
    networks: [livo-net]

  tournament-service:
    build:
      context: .
      dockerfile: apps/tournament-service/Dockerfile
    container_name: livo-tournament-service
    restart: unless-stopped
